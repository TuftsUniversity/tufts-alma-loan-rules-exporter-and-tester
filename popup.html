<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Alma Rule Harvester</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      min-width: 420px;
      max-height: 600px;
      overflow-y: auto;
      padding: 10px;
    }

    input[type="file"] {
      display: block;
      width: 100%;
      margin: 4px 0 10px 0;
    }

    h2 {
      font-size: 14px;
      margin-top: 12px;
}
    h1 { font-size: 16px; margin: 0 0 8px 0; }
    button { margin: 3px; padding: 6px 8px; }
    #status {
      white-space: pre-wrap;
      background: #f4f4f4;
      border: 1px solid #ddd;
      padding: 6px;
      margin-top: 8px;
      font-size: 12px;
      max-height: 180px;
      overflow: auto;
    }

    
  </style>
</head>
<body>
  <h1>Alma Rule Harvester</h1>
  <div>
<button id="startCurrent">Start Current Unit</button>
<button id="startAll">Start All Units</button>
<button id="resume">Resume</button>
<button id="stop">Stop</button>
<button id="download">Download</button>
<button id="clear">Clear</button>
    
  </div>
  <hr>
<h2>Rule Test</h2>

<label>Harvested loan rules CSV/JSON</label>
<input type="file" id="rulesFile" accept=".csv,.json">

<label>Item policy/location CSV</label>
<input type="file" id="itemLocationsFile" accept=".csv">

<label>User groups CSV</label>
<input type="file" id="userGroupsFile" accept=".csv">

<button id="generateTest">Generate Test Matrix</button>
  <div id="status">Open an Alma Fulfillment Unit Rules page, then click Start.</div>
  <script src="popup.js"></script>
</body>
</html>
